<h1 id="collection-title">MY CHAMPIONSHIP ROSTER (0 / 23)</h1>
<div id="collection-grid"></div>
<button id="clear-btn" onclick="clearCollection()">Reset Collection</button>

<script>
    const totalCards = 23; 
    const folderPath = "rare ewf cards"; 
    let musicStarted = false;

    function ripPack() {
        const bgMusic = document.getElementById("bgMusic");
        if (!musicStarted) {
            bgMusic.volume = 0.3;
            bgMusic.play().catch(e => console.log("Audio blocked"));
            musicStarted = true;
        }
        document.getElementById("cheerSound").currentTime = 0;
        document.getElementById("cheerSound").play();

        const area = document.getElementById('pack-area');
        area.innerHTML = ''; 
        
        for (let i = 0; i < 5; i++) {
            const randomNum = Math.floor(Math.random() * totalCards) + 1;
            const fileName = "card (" + randomNum + ").jpg"; 

            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            // saveCard only triggers when they actually FLIP the card
            cardDiv.innerHTML = `
                <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped'); saveCard('${fileName}')">
                    <div class="back"></div>
                    <div class="front" style="background-image: url('${folderPath}/${fileName}')"></div>
                </div>`;
            area.appendChild(cardDiv);
        }
    }

    function saveCard(cardImg) {
        let collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
        
        // NO-DUPLICATE CHECK: Only add if we don't have it
        if (!collection.includes(cardImg)) {
            collection.push(cardImg);
            localStorage.setItem('EWF_Collection', JSON.stringify(collection));
            displayCollection();
        }
    }

    function displayCollection() {
        const grid = document.getElementById('collection-grid');
        const title = document.getElementById('collection-title');
        const collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
        
        // UPDATE THE COUNTER
        title.innerHTML = `MY CHAMPIONSHIP ROSTER (${collection.length} / ${totalCards})`;
        
        grid.innerHTML = '';
        collection.forEach(img => {
            const div = document.createElement('div');
            div.className = 'saved-card';
            div.style.backgroundImage = `url('${folderPath}/${img}')`;
            div.onclick = () => { window.open(`${folderPath}/${img}`, '_blank'); };
            grid.appendChild(div);
        });
    }

    function clearCollection() {
        if(confirm("Vacate all titles? (This resets your counter to 0)")) {
            localStorage.removeItem('EWF_Collection');
            displayCollection();
        }
    }
</script>
