<!DOCTYPE html>
<html>
<head>
    <title>My EWF Collection 2026</title>
    <style>
        body { background: url('background.jpg') center/cover no-repeat fixed; color: white; font-family: 'Arial Black', sans-serif; text-align: center; padding: 20px; margin: 0; overflow-x: hidden; }
        h1 { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 3em; margin-bottom: 5px; }
        
        #stats-bar { background: rgba(0,0,0,0.9); border: 2px solid #D4AF37; display: inline-block; padding: 15px 40px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 20px black; }
        #cash-display { color: #00FF00; font-size: 28px; font-weight: bold; }
        
        #progress-container { width: 100%; height: 12px; background: #222; border-radius: 6px; margin-top: 10px; border: 1px solid #555; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #D4AF37, #fff, #D4AF37); background-size: 200% 100%; transition: 0.5s; }

        #pack-area { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 250px; }
        .pack-card { width: 150px; height: 210px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .pack-card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 3px solid #D4AF37; }
        .back { background: url('wrapper.jpg') center/cover; background-color: #222; }
        .front { transform: rotateY(180deg); background-size: cover; background-position: center; }

        .card-container { width: 160px; height: 230px; perspective: 1000px; display: inline-block; margin: 15px; vertical-align: top; }
        .saved-card { width: 100%; height: 100%; border-radius: 12px; border: 3px solid #D4AF37; background-size: cover; background-position: center; position: relative; transition: transform 0.1s ease-out; cursor: pointer; transform-style: preserve-3d; }
        .is-holo { border-color: cyan !important; box-shadow: 0 0 15px cyan; }
        .shine { position: absolute; inset: 0; border-radius: 12px; background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.4) 50%, transparent 60%); background-size: 200% 200%; pointer-events: none; z-index: 2; opacity: 0; }
        .saved-card:hover .shine { opacity: 1; }
        .win-count { position: absolute; top: -12px; right: -12px; background: red; color: white; border-radius: 50%; width: 30px; height: 30px; font-size: 14px; line-height: 30px; border: 2px solid white; z-index: 10; font-weight: bold; }

        /* BATTLE STUFF */
        #battle-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #battle-card { width: 280px; height: 400px; border: 5px solid gold; background-size: cover; background-position: center; z-index: 1001; }
        #battle-text { font-size: 4em; color: gold; text-shadow: 0 0 20px red; margin-top: 20px; font-style: italic; z-index: 1001; }
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 2000; pointer-events: none; }
        @keyframes rumble { 0% { transform: translate(2px,2px); } 50% { transform: translate(-2px,-2px); } 100% { transform: translate(0,0); } }
        .rumble { animation: rumble 0.1s linear infinite; }

        button { padding: 12px 25px; font-size: 16px; color: white; border: 2px solid #fff; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; transition: 0.2s; }
        .rip-std { background: linear-gradient(#e60000, #800000); }
        .rip-super { background: linear-gradient(#D4AF37, #8a6d3b); border-color: gold; color: black; }
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body onload="initGame()">
    
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="cheerSound"><source src="cheer.mp3" type="audio/mpeg"></audio>
    <div id="battle-overlay"><div id="battle-card"></div><div id="battle-text">FIGHT!</div></div>

    <h1>ELITE WRESTLING FEDERATION</h1>
    <div id="stats-bar">
        <div id="cash-display">CONTRACT FUNDS: $0</div>
        <div id="rank-display" style="color:gold; margin-top:5px;">RANK: ROOKIE PROMOTER</div>
        <div id="progress-container"><div id="progress-fill"></div></div>
        <button style="background:#222; font-size:10px; padding:5px; margin-top:10px;" onclick="localStorage.clear(); location.reload();">FULL DATA RESET</button>
    </div>
    <br>
    <button class="rip-std" id="rip-std-btn" onclick="ripPack(100, 0.15)">RIP STANDARD PACK ($100)</button>
    <button class="rip-super" id="rip-super-btn" onclick="ripPack(500, 0.65)">RIP SUPER HOLO PACK ($500)</button>
    
    <div id="pack-area"></div>
    <h2 id="collection-title" style="color: gold; margin-top: 50px; border-top: 2px solid gold; padding-top: 20px;">MY EWF COLLECTION</h2>
    <div id="collection-grid"></div>

    <script>
        const totalCards = 23;
        const folderPath = "rare ewf cards";
        let userCash = parseInt(localStorage.getItem('EWF_Cash'));
        if (isNaN(userCash) || userCash <= 0) userCash = 500;
        let musicStarted = false;

        function initGame() {
            updateUI();
            displayCollection();
            setInterval(() => { userCash += 25; saveGame(); updateUI(); }, 30000);
        }

        function triggerConfetti() {
            const colors = ['#e60000', '#00FF00', '#FFD700', '#fff'];
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.cssText = `left:${Math.random()*100}vw; top:${Math.random()*50}vh; background:${colors[Math.floor(Math.random()*colors.length)]};`;
                document.body.appendChild(c);
                let cy = 0, opacity = 1;
                const drift = setInterval(() => {
                    cy += Math.random() * 5 + 2; opacity -= 0.01;
                    c.style.transform = `translateY(${cy}px) rotate(${cy}deg)`; c.style.opacity = opacity;
                    if (opacity <= 0) { clearInterval(drift); c.remove(); }
                }, 20);
            }
        }

        function ripPack(cost, holoChance) {
            if (userCash < cost) return;
            userCash -= cost; saveGame(); updateUI();
            if (!musicStarted) { document.getElementById("bgMusic").volume = 0.2; document.getElementById("bgMusic").play().catch(e=>{}); musicStarted = true; }
            document.getElementById("cheerSound").currentTime = 0; document.getElementById("cheerSound").play().catch(e=>{});
            const area = document.getElementById('pack-area'); area.innerHTML = ''; 
            for (let i = 0; i < 5; i++) {
                const num = Math.floor(Math.random() * totalCards) + 1;
                const isHolo = Math.random() < holoChance;
                const imgFile = `card (${num}).jpg`;
                const cardDiv = document.createElement('div');
                cardDiv.className = 'pack-card';
                cardDiv.innerHTML = `<div class="card-inner"><div class="back"></div><div class="front" style="background-image: url('${folderPath}/${imgFile}'); ${isHolo ? 'border-color:cyan; box-shadow: 0 0 10px cyan;' : ''}"></div></div>`;
                cardDiv.onclick = function() {
                    if(!this.classList.contains('flipped')) { this.classList.add('flipped'); saveCard(imgFile, isHolo); }
                };
                area.appendChild(cardDiv);
            }
        }

        function saveCard(img, holo) {
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            if (!col.find(c => c.img === img)) {
                col.push({ img, wins: 0, holo });
                localStorage.setItem('EWF_Collection', JSON.stringify(col));
                displayCollection(); updateUI();
            } else { userCash += 50; saveGame(); updateUI(); }
        }

        function startMatch(cardImg, cardIndex) {
            const overlay = document.getElementById('battle-overlay'), bCard = document.getElementById('battle-card'), bText = document.getElementById('battle-text');
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            overlay.style.display = 'flex'; bCard.style.backgroundImage = `url('${folderPath}/${cardImg}')`;
            bCard.className = 'rumble'; bText.innerHTML = "FIGHTING...";
            setTimeout(() => {
                bCard.classList.remove('rumble');
                if (Math.random() > 0.5) {
                    bText.innerHTML = "WINNER!"; bText.style.color = "#00FF00"; triggerConfetti(); col[cardIndex].wins++;
                } else { bText.innerHTML = "DEFEAT"; bText.style.color = "red"; }
                localStorage.setItem('EWF_Collection', JSON.stringify(col));
                setTimeout(() => { overlay.style.display = 'none'; displayCollection(); }, 2000);
            }, 1500);
        }

        function updateUI() {
            document.getElementById('cash-display').innerHTML = `CONTRACT FUNDS: $${userCash}`;
            document.getElementById('rip-std-btn').disabled = (userCash < 100);
            document.getElementById('rip-super-btn').disabled = (userCash < 500);
            const col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            let r = "ROOKIE PROMOTER"; let next = 6; let base = 0;
            if (col.length >= 19) { r = "LEGENDARY COLLECTOR"; next = 23; base = 19; }
            else if (col.length >= 13) { r = "ELITE EXECUTIVE"; next = 19; base = 13; }
            else if (col.length >= 6) { r = "PRO MANAGER"; next = 13; base = 6; }
            document.getElementById('rank-display').innerHTML = `RANK: ${r}`;
            document.getElementById('progress-fill').style.width = Math.min(((col.length - base) / (next - base)) * 100, 100) + "%";
        }

        function saveGame() { localStorage.setItem('EWF_Cash', userCash); }

        function displayCollection() {
            const grid = document.getElementById('collection-grid'), col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            grid.innerHTML = '';
            col.forEach((card, index) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                const cardDiv = document.createElement('div');
                cardDiv.className = `saved-card ${card.holo ? 'is-holo' : ''}`;
                cardDiv.style.backgroundImage = `url('${folderPath}/${card.img}')`;
                cardDiv.innerHTML = `<div class="shine"></div>${card.wins > 0 ? `<div class="win-count">${card.wins}</div>` : ''}`;
                cardDiv.onclick = () => startMatch(card.img, index);
                container.appendChild(cardDiv);
                grid.appendChild(container);
            });
        }
    </script>
</body>
</html>
