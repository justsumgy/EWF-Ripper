<!DOCTYPE html>
<html>
<head>
    <title>My EWF Collection 2026</title>
    <style>
        body { background: url('background.jpg') center/cover no-repeat fixed; color: white; font-family: 'Arial Black', sans-serif; text-align: center; padding: 20px; margin: 0; overflow-x: hidden; user-select: none; }
        h1 { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 3em; margin-bottom: 5px; }
        
        #stats-bar { background: rgba(0,0,0,0.9); border: 2px solid #D4AF37; display: inline-block; padding: 15px 40px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 20px black; position: relative; }
        #cash-display { color: #00FF00; font-size: 28px; font-weight: bold; }
        
        #progress-container { width: 100%; height: 12px; background: #222; border-radius: 6px; margin-top: 10px; border: 1px solid #555; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #D4AF37, #fff, #D4AF37); background-size: 200% 100%; transition: 0.5s; }

        #music-toggle { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 2px solid #D4AF37; font-size: 16px; font-weight: bold; color: white; cursor: pointer; padding: 10px 15px; border-radius: 8px; z-index: 9999; transition: 0.2s; }
        #music-toggle:hover { background: #D4AF37; color: black; }

        #pack-area { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 250px; }
        .pack-card { width: 150px; height: 210px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .pack-card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 3px solid #D4AF37; }
        .back { background: url('wrapper.jpg') center/cover; background-color: #222; }
        .front { transform: rotateY(180deg); background-size: cover; background-position: center; }

        /* INCREASED HEIGHT FOR SELL BUTTON */
        .card-container { width: 160px; height: 280px; perspective: 1000px; display: inline-block; margin: 15px; vertical-align: top; }
        .saved-card { width: 100%; height: 230px; border-radius: 12px; border: 3px solid silver; background-size: cover; background-position: center; position: relative; transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; cursor: pointer; transform-style: preserve-3d; box-shadow: 0 10px 20px rgba(0,0,0,0.5); padding-top: 30px; background-color: white; }
        
        .grade-label { position: absolute; top: 0; left: 0; width: 100%; background: #c00; border-bottom: 2px solid silver; color: white; font-family: 'Arial', sans-serif; text-align: center; border-top-left-radius: 9px; border-top-right-radius: 9px; z-index: 6; pointer-events: none; }
        .grade-title { font-size: 8px; font-weight: bold; letter-spacing: 1px; padding-top: 2px; }
        .grade-score { font-size: 14px; font-weight: 900; padding-bottom: 2px; }
        .gem-mint { background: linear-gradient(45deg, #D4AF37, #FFDF00, #D4AF37); color: black; border-bottom: 2px solid black; }
        
        .shine-layer { position: absolute; inset: 0; border-radius: 12px; background: radial-gradient(circle at var(--lx) var(--ly), rgba(255,255,255,0.7) 0%, transparent 50%); z-index: 5; pointer-events: none; opacity: 0; mix-blend-mode: screen; transition: opacity 0.3s; }
        .holo-foil { position: absolute; inset: 0; border-radius: 12px; background-image: linear-gradient(110deg, transparent 15%, #ff00ff4d 30%, #00ffff4d 50%, #ffff004d 70%, transparent 85%); background-size: 200% 200%; background-position: var(--hx) var(--hy); mix-blend-mode: color-dodge; z-index: 4; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .sparkle-layer { position: absolute; inset: 0; border-radius: 12px; background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36z8gAFWNZv349RgaoWKsGpgbAawOQ/r0D0wU/EQAAAABJRU5ErkJggg=='); background-repeat: repeat; background-position: var(--sx) var(--sy); mix-blend-mode: color-dodge; z-index: 3; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .is-holo { box-shadow: 0 0 15px cyan; border-color: cyan !important; }
        .saved-card:hover .shine-layer, .saved-card:hover .sparkle-layer { opacity: 1; }
        .is-holo.saved-card .holo-foil { opacity: 1; }

        .win-count { position: absolute; top: 15px; right: -12px; background: red; color: white; border-radius: 50%; width: 30px; height: 30px; font-size: 14px; line-height: 30px; border: 2px solid white; z-index: 10; font-weight: bold; box-shadow: 0 0 10px black; }
        
        /* SELL BUTTON */
        .sell-btn { width: 100%; margin-top: 10px; padding: 5px; font-size: 14px; background: #228B22; color: white; border: 1px solid gold; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .sell-btn:hover { background: #32CD32; transform: scale(1.05); }

        #battle-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #battle-card { width: 280px; height: 400px; border: 5px solid gold; border-radius: 15px; background-size: cover; background-position: center; z-index: 1001; box-shadow: 0 0 30px gold; }
        #battle-text { font-size: 4em; color: gold; text-shadow: 0 0 20px red; margin-top: 20px; font-style: italic; z-index: 1001; }
        .confetti { position: fixed; width: 10px; height: 10px; z-index: 2000; pointer-events: none; }
        @keyframes rumble { 0% { transform: translate(3px,3px); } 50% { transform: translate(-3px,-3px); } 100% { transform: translate(0,0); } }
        .rumble { animation: rumble 0.1s linear infinite; }

        button.rip-btn { padding: 12px 25px; font-size: 16px; color: white; border: 2px solid #fff; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; transition: 0.2s; }
        .rip-std { background: linear-gradient(#e60000, #800000); }
        .rip-super { background: linear-gradient(#D4AF37, #8a6d3b); border-color: gold; color: black; }
        button.rip-btn:hover { transform: scale(1.05); }
        button.rip-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        #history-box { background: rgba(0,0,0,0.8); border: 1px solid #555; max-width: 400px; margin: 20px auto; padding: 10px; border-radius: 8px; font-size: 13px; }
    </style>
</head>
<body onload="initGame()">
    
    <button id="music-toggle" onclick="toggleMusic()">🔇 Play Music</button>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="cheerSound"><source src="cheer.mp3" type="audio/mpeg"></audio>
    
    <div id="battle-overlay">
        <div id="battle-card">
