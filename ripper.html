<!DOCTYPE html>
<html>
<head>
    <title>EWF Elite Manager</title>
    <style>
        body { 
            background: url('background.jpg') center/cover no-repeat fixed; 
            color: white; font-family: 'Arial Black', sans-serif; text-align: center; padding: 20px;
            border: 5px solid #D4AF37; min-height: 100vh; margin: 0;
        }
        h1 { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 3em; margin-bottom: 5px; }
        
        #stats-bar { background: rgba(0,0,0,0.9); border: 2px solid #D4AF37; display: inline-block; padding: 15px 40px; border-radius: 10px; margin-bottom: 20px; }
        #cash-display { color: #00FF00; font-size: 28px; font-weight: bold; }

        #pack-area { margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; min-height: 350px; }
        
        /* CARD STYLES */
        .card { width: 220px; height: 320px; perspective: 1000px; cursor: pointer; position: relative; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.7); }
        .back { background: url('wrapper.jpg') center/cover; border: 3px solid #D4AF37; }
        .front { transform: rotateY(180deg); background-size: cover; background-position: center; border: 4px solid #fff; }

        /* RARITY BORDERS */
        .elite-border { border-color: #FFD700 !important; box-shadow: 0 0 20px #FFD700; }
        .legendary-border { border-color: #ff00ff !important; animation: rainbow 2s infinite linear; }
        @keyframes rainbow { 0% { box-shadow: 0 0 15px red; } 33% { box-shadow: 0 0 15px cyan; } 66% { box-shadow: 0 0 15px lime; } 100% { box-shadow: 0 0 15px red; } }

        .rarity-tag { position: absolute; bottom: 10px; width: 100%; background: rgba(0,0,0,0.7); font-size: 12px; color: gold; padding: 2px 0; border-radius: 0 0 8px 8px; }

        button { padding: 15px 30px; font-size: 18px; background: linear-gradient(#e60000, #800000); color: white; border: 2px solid #fff; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; opacity: 0.5; cursor: not-allowed; }
        .daily-btn { background: linear-gradient(#00c6ff, #0072ff); }

        #collection-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; padding: 20px; }
        .saved-card { width: 140px; height: 200px; border-radius: 8px; background-size: cover; border: 2px solid #fff; transition: 0.3s; position: relative; }
        .saved-card:hover { transform: scale(1.2); z-index: 10; }
        .win-count { position: absolute; top: -10px; right: -10px; background: red; border-radius: 50%; width: 25px; height: 25px; font-size: 14px; line-height: 25px; }

    </style>
</head>
<body onload="initGame()">
    
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="cheerSound"><source src="cheer.mp3" type="audio/mpeg"></audio>

    <h1>ELITE WRESTLING FEDERATION</h1>
    
    <div id="stats-bar">
        <div id="cash-display">FUNDS: $0</div>
        <button id="daily-btn" class="daily-btn" onclick="claimDaily()">DAILY REWARD (+$500)</button>
    </div>
    <br>
    <button id="rip-btn" onclick="ripPack()">RIP ELITE PACK ($100)</button>
    
    <div id="pack-area"></div>

    <h2 id="collection-title" style="color: gold; margin-top: 50px; border-top: 2px solid gold; padding-top: 20px;">
        CHAMPIONSHIP ROSTER (0 / 23)
    </h2>
    <div id="collection-grid"></div>
    <button style="font-size: 10px; padding: 5px;" onclick="clearEverything()">Nuke Save</button>

    <script>
        const totalCards = 23; 
        const folderPath = "rare ewf cards"; 
        let userCash = parseInt(localStorage.getItem('EWF_Cash')) || 300;
        let lastDaily = localStorage.getItem('EWF_Daily') || 0;

        function initGame() {
            updateUI();
            displayCollection();
            setInterval(() => { userCash += 5; saveGame(); updateUI(); }, 60000); // Passive $5/min
        }

        function updateUI() {
            document.getElementById('cash-display').innerHTML = `CONTRACT FUNDS: $${userCash}`;
            document.getElementById('rip-btn').disabled = (userCash < 100);
            
            // Daily check
            const now = new Date().getTime();
            const oneDay = 24 * 60 * 60 * 1000;
            document.getElementById('daily-btn').disabled = (now - lastDaily < oneDay);
        }

        function saveGame() { localStorage.setItem('EWF_Cash', userCash); }

        function claimDaily() {
            userCash += 500;
            lastDaily = new Date().getTime();
            localStorage.setItem('EWF_Daily', lastDaily);
            saveGame();
            updateUI();
            alert("Sponsorship Deal Signed! +$500");
        }

        function ripPack() {
            if (userCash < 100) return;
            userCash -= 100;
            saveGame();
            updateUI();
            document.getElementById("cheerSound").currentTime = 0;
            document.getElementById("cheerSound").play();

            const area = document.getElementById('pack-area');
            area.innerHTML = ''; 
            
            for (let i = 0; i < 5; i++) {
                const randomNum = Math.floor(Math.random() * totalCards) + 1;
                const fileName = `card (${randomNum}).jpg`; 
                
                // RARITY LOGIC
                const roll = Math.random() * 100;
                let rarity = "Common";
                let rarityClass = "";
                if (roll > 98) { rarity = "LEGENDARY"; rarityClass = "legendary-border"; }
                else if (roll > 85) { rarity = "ELITE"; rarityClass = "elite-border"; }

                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.innerHTML = `
                    <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped'); saveCard('${fileName}', '${rarity}')">
                        <div class="back"></div>
                        <div class="front ${rarityClass}" style="background-image: url('${folderPath}/${fileName}')">
                            <div class="rarity-tag">${rarity}</div>
                        </div>
                    </div>`;
                area.appendChild(cardDiv);
            }
        }

        function saveCard(img, rarity) {
            let collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            
            // Find if card exists
            const existing = collection.find(c => c.img === img);
            
            if (!existing) {
                collection.push({ img: img, rarity: rarity, wins: 0 });
                localStorage.setItem('EWF_Collection', JSON.stringify(collection));
                displayCollection();
            } else {
                // SELL DUPLICATE
                userCash += 50;
                saveGame();
                updateUI();
                console.log("Duplicate sold for $50");
            }
        }

        function displayCollection() {
            const grid = document.getElementById('collection-grid');
            const collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            document.getElementById('collection-title').innerHTML = `CHAMPIONSHIP ROSTER (${collection.length} / ${totalCards})`;
            grid.innerHTML = '';
            
            collection.forEach(card => {
                const div = document.createElement('div');
                div.className = `saved-card ${card.rarity === 'ELITE' ? 'elite-border' : ''} ${card.rarity === 'LEGENDARY' ? 'legendary-border' : ''}`;
                div.style.backgroundImage = `url('${folderPath}/${card.img}')`;
                
                // Click to "Battle" (Simulate match)
                div.onclick = () => {
                    if(confirm(`Send ${card.img} into a match?`)) {
                        if(Math.random() > 0.4) {
                            card.wins++;
                            alert("WINNER! Record updated.");
                        } else {
                            alert("Tough loss at the Pay-Per-View.");
                        }
                        localStorage.setItem('EWF_Collection', JSON.stringify(collection));
                        displayCollection();
                    }
                };
                
                if(card.wins > 0) {
                    div.innerHTML = `<div class="win-count">${card.wins}</div>`;
                }
                grid.appendChild(div);
            });
        }

        function clearEverything() {
            if(confirm("Wipe everything?")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>
