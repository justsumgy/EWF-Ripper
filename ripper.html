<!DOCTYPE html>
<html>
<head>
    <title>EWF RIPPED (TCG) - v7.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.5);
            --dark-glass: rgba(15, 15, 20, 0.9);
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
        }

        body { background: url('background.jpg') center/cover no-repeat fixed; background-color: #111; color: white; font-family: 'Montserrat', sans-serif; text-align: center; padding: 0; margin: 0; overflow-x: hidden; user-select: none; }
        
        #ticker-wrap { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold); padding: 8px; overflow: hidden; white-space: nowrap; font-size: 13px; color: #ddd; position: relative; z-index: 100; letter-spacing: 2px; }
        #ticker-text { display: inline-block; animation: scroll-ticker 40s linear infinite; font-weight: 700; }
        @keyframes scroll-ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        #early-access { position: fixed; top: 60px; left: 20px; background: var(--red); color: white; padding: 6px 12px; font-weight: 900; border-radius: 4px; font-size: 11px; z-index: 9999; letter-spacing: 1px; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }

        .glass-panel { background: var(--dark-glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); padding: 20px; }
        
        #dashboard { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; max-width: 1250px; margin: 20px auto; }
        
        #stats-panel { flex: 1; min-width: 250px; text-align: left; }
        #cash-display { color: var(--green); font-size: 32px; font-weight: 900; }
        #heat-display { color: #f39c12; font-size: 12px; font-weight: 900; margin-top: 5px; text-transform: uppercase; }
        
        #social-feed { flex: 1.2; min-width: 300px; text-align: left; max-height: 200px; overflow-y: hidden; }
        .tweet { font-size: 11px; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        #action-panel { flex: 2; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
        .main-btn { padding: 10px; font-size: 10px; font-weight: 900; color: white; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; cursor: pointer; text-transform: uppercase; }

        /* PACK OPENING AREA */
        #pack-area { margin: 20px 0; min-height: 320px; display: flex; justify-content: center; align-items: center; gap: 15px; flex-wrap: wrap; }
        
        #sealed-pack { width: 180px; height: 260px; background: linear-gradient(135deg, #d4af37, #ffd700, #8a6d3b); border: 3px solid white; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; transition: 0.3s; }
        #sealed-pack:hover { transform: scale(1.05) rotate(2deg); }
        #sealed-pack h2 { color: black; transform: rotate(-15deg); font-weight: 900; }

        .pack-card { width: 150px; height: 210px; perspective: 1000px; cursor: pointer; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; }
        .pack-card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); }
        .back { background: url('wrapper.jpg') center/cover; background-color: #222; border-color: var(--gold); }
        .front { transform: rotateY(180deg); background-size: cover; background-position: center; }

        /* RUMBLE ANIMATION */
        .super-shake { animation: rumble 0.15s linear infinite; }
        @keyframes rumble { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(0,0); } }

        /* COLLECTION CARDS */
        .card-container { width: 170px; min-height: 480px; display: inline-flex; flex-direction: column; align-items: center; margin: 15px; vertical-align: top; position: relative; }
        .saved-card { width: 100%; height: 240px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); position: relative; background-color: #1a1a1a; z-index: 10; overflow: hidden; }
        
        .grade-label { position: absolute; top: 0; left: 0; width: 100%; background: #c00; border-bottom: 2px solid #000; color: white; text-align: center; z-index: 20; }
        .grade-title { font-size: 8px; font-weight: 900; padding-top: 4px; }
        .grade-score { font-size: 13px; font-weight: 900; padding-bottom: 4px; }
        .gem-mint { background: linear-gradient(45deg, #D4AF37, #FFDF00, #D4AF37); color: black; }

        .win-tag { position: absolute; top: 12px; left: 5px; background: rgba(0,0,0,0.7); color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: 900; z-index: 30; }
        .speech-bubble { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 900; white-space: nowrap; z-index: 50; opacity: 0; transition: 0.3s; }
        .speech-active { opacity: 1; transform: translateX(-50%) translateY(-5px); }
        .align-icon { position: absolute; bottom: 8px; left: 8px; font-size: 18px; z-index: 30; filter: drop-shadow(0 0 5px black); }

        .gm-controls { display: flex; flex-direction: column; gap: 4px; margin-top: 10px; width: 100%; }
        .gm-btn { padding: 6px; font-size: 9px; color: #ccc; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; font-weight: 700; text-transform: uppercase; }

        .is-holo { border-color: cyan !important; box-shadow: 0 0 15px rgba(0,255,255,0.4); }
    </style>
</head>
<body onload="initGame()">

    <div id="ticker-wrap"><div id="ticker-text">EWF STOCK EXCHANGE OPEN... BOUTIQUE TRADING CARDS IN STOCK...</div></div>
    <div id="early-access">V7.2 RUMBLE BUILD</div>
    
    <h1>EWF RIPPED</h1>

    <div id="dashboard" class="glass-panel">
        <div id="stats-panel">
            <div id="cash-display">$0</div>
            <div id="heat-display">CROWD: 😐 LUKEWARM</div>
            <button id="auto-btn" class="main-btn" onclick="toggleAuto()" style="display:none; margin-top:10px; width:100%;">AUTO-BOOK: OFF</button>
        </div>

        <div id="social-feed">
            <div style="font-size:10px; color:cyan; font-weight:900; border-bottom:1px solid #333; margin-bottom:5px;">📱 EWF DIRT SHEET</div>
            <div id="social-content"></div>
        </div>

        <div id="action-panel">
            <button class="main-btn" style="border-bottom:3px solid var(--red);" onclick="buyPack(100, 0.15)">STANDARD ($100)</button>
            <button class="main-btn" style="border-bottom:3px solid var(--gold);" onclick="buyPack(500, 0.65)">SUPER ($500)</button>
            <button class="main-btn" onclick="hardReset()">RESET DATA</button>
        </div>
    </div>

    <div id="pack-area"></div>

    <div class="showcase-area">
        <h2 style="font-weight:900;">MY ACTIVE ROSTER</h2>
        <div id="collection-grid"></div>
    </div>

    <script>
        const totalCards = 23; const folderPath = "rare ewf cards";
        let userCash = parseInt(localStorage.getItem('EWF_Cash')) || 3000;
        let collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
        let pendingPack = [];

        function initGame() {
            updateUI(); displayCollection();
            setInterval(() => { userCash += 25; saveGame(); updateUI(); }, 30000);
        }

        function postTweet(text, handle) {
            let feed = document.getElementById('social-content');
            feed.innerHTML = `<div class="tweet"><b style="color:var(--gold);">${handle}:</b> ${text}</div>` + feed.innerHTML;
            if(feed.children.length > 4) feed.lastElementChild.remove();
        }

        function buyPack(cost, holoChance) {
            if(userCash < cost) return alert("Not enough cash!");
            userCash -= cost;
            pendingPack = [];
            for(let i=0; i<5; i++) {
                let num = Math.floor(Math.random() * totalCards) + 1;
                let holo = Math.random() < holoChance;
                let grade = Math.floor(Math.random() * 4) + 7;
                pendingPack.push({ img: `card (${num}).jpg`, wins: 0, holo: holo, grade: grade, alignment: Math.random() > 0.5 ? "face" : "heel" });
            }
            renderSealedPack();
            updateUI();
        }

        function renderSealedPack() {
            const area = document.getElementById('pack-area');
            area.innerHTML = `<div id="sealed-pack" onclick="openPack()"><h2>RIP!</h2></div>`;
        }

        function openPack() {
            const area = document.getElementById('pack-area');
            area.innerHTML = "";
            pendingPack.forEach((card, i) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = "pack-card";
                // TRIGGER RUMBLE IF RARE
                let shakeClass = (card.holo || card.grade === 10) ? "super-shake" : "";
                
                cardDiv.innerHTML = `
                    <div class="card-inner ${shakeClass}">
                        <div class="back"></div>
                        <div class="front" style="background-image: url('${folderPath}/${card.img}'); ${card.holo ? 'border-color:cyan;' : ''}">
                            <div class="grade-label ${card.grade === 10 ? 'gem-mint' : ''}">
                                <div class="grade-title">EWF AUTHENTIC</div>
                                <div class="grade-score">MINT ${card.grade}</div>
                            </div>
                        </div>
                    </div>
                `;
                cardDiv.onclick = function() {
                    if(!this.classList.contains('flipped')) {
                        this.classList.add('flipped');
                        this.querySelector('.card-inner').classList.remove('super-shake');
                        saveCard(card);
                    }
                };
                area.appendChild(cardDiv);
            });
        }

        function saveCard(card) {
            collection.push(card);
            saveGame();
            displayCollection();
            if(card.holo) postTweet("JUST SAW A HOLO PULL! CRAZY!", "@PackPro");
        }

        function displayCollection() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = "";
            collection.forEach((card, i) => {
                const container = document.createElement('div');
                container.className = "card-container";
                container.innerHTML = `
                    <div class="speech-bubble">READY!</div>
                    <div class="saved-card ${card.holo ? 'is-holo' : ''}" style="background-image: url('${folderPath}/${card.img}'); background-size: cover;">
                        <div class="grade-label ${card.grade === 10 ? 'gem-mint' : ''}">
                            <div class="grade-title">EWF AUTHENTIC</div>
                            <div class="grade-score">MINT ${card.grade}</div>
                        </div>
                        <div class="win-tag">${card.wins}W</div>
                        <div class="align-icon">${card.alignment === "face" ? "😇" : "💀"}</div>
                    </div>
                    <div class="gm-controls">
                        <button class="gm-btn" onclick="sellCard(${i})">SELL ($${(card.grade * 20)})</button>
                    </div>
                `;
                grid.appendChild(container);
            });
        }

        function updateUI() {
            document.getElementById('cash-display').innerText = "$" + userCash.toLocaleString();
        }

        function saveGame() { 
            localStorage.setItem('EWF_Cash', userCash); 
            localStorage.setItem('EWF_Collection', JSON.stringify(collection)); 
        }

        function hardReset() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
