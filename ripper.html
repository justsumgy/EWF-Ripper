<!DOCTYPE html>
<html>
<head>
    <title>EWF RIPPED (TCG)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.5);
            --dark-glass: rgba(15, 15, 20, 0.85);
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
        }

        body { background: url('background.jpg') center/cover no-repeat fixed; background-color: #111; color: white; font-family: 'Montserrat', sans-serif; text-align: center; padding: 0; margin: 0; overflow-x: hidden; user-select: none; transition: background 1s ease-in-out, box-shadow 0.5s; }
        
        #ticker-wrap { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold); padding: 8px; overflow: hidden; white-space: nowrap; font-size: 13px; color: #ddd; position: relative; z-index: 1000; letter-spacing: 2px; text-transform: uppercase; }
        #ticker-text { display: inline-block; animation: scroll-ticker 40s linear infinite; font-weight: 700; }
        @keyframes scroll-ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        #early-access { position: fixed; top: 60px; left: 20px; background: var(--red); color: white; padding: 6px 10px; font-weight: 900; border-radius: 4px; font-size: 11px; z-index: 9999; letter-spacing: 1px; pointer-events: none; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); }

        #invasion-banner { position: fixed; top: 0; left: 0; width: 100%; background: #8b0000; border-bottom: 3px solid #ff0000; color: white; font-size: 20px; font-weight: 900; padding: 12px; z-index: 10000; display: none; cursor: pointer; animation: flash-red 1s infinite alternate; text-shadow: 0 0 10px black; text-transform: uppercase; }
        @keyframes flash-red { from { background: #8b0000; box-shadow: 0 0 20px red; } to { background: #ff0000; box-shadow: 0 0 50px red; } }

        h1 { color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); font-size: 2.8em; margin: 25px 0 5px 0; font-weight: 900; letter-spacing: -1px; }
        
        .glass-panel { background: var(--dark-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1); padding: 20px; }
        
        #dashboard { display: flex; flex-wrap: wrap; justify-content: center; align-items: stretch; gap: 20px; max-width: 1200px; margin: 20px auto; }
        
        #stats-panel { flex: 1; min-width: 250px; text-align: left; display: flex; flex-direction: column; justify-content: center; }
        #cash-display { color: var(--green); font-size: 32px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        #income-display { color: #aaa; font-size: 13px; margin-top: 5px; font-weight: 700; letter-spacing: 1px; }
        
        /* SENTIMENT METER */
        #sentiment-wrap { margin-top: 15px; }
        #sentiment-label { font-size: 10px; font-weight: 900; color: cyan; text-transform: uppercase; display: flex; justify-content: space-between; }
        #sentiment-bar { width: 100%; height: 6px; background: #222; border-radius: 3px; margin-top: 4px; overflow: hidden; }
        #sentiment-fill { height: 100%; width: 50%; background: linear-gradient(90deg, var(--red), var(--gold), var(--green)); transition: width 0.5s ease; }

        #social-feed { flex: 1.2; min-width: 300px; text-align: left; position: relative; overflow: hidden; display: flex; flex-direction: column; max-height: 280px; }
        .tweet { font-size: 11px; margin-bottom: 8px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; position: relative; }
        .reply-btn { background: rgba(0, 255, 255, 0.1); border: 1px solid cyan; color: cyan; font-size: 8px; padding: 2px 6px; border-radius: 4px; cursor: pointer; float: right; text-transform: uppercase; font-weight: 900; }
        .reply-btn:hover { background: cyan; color: black; }

        #action-panel { flex: 2; min-width: 400px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-content: start; }
        
        .main-btn { padding: 12px 10px; font-size: 11px; font-weight: 900; color: white; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        .main-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }

        .card-container { width: 160px; min-height: 460px; height: auto; perspective: 1000px; display: inline-flex; flex-direction: column; align-items: center; margin: 15px; vertical-align: top; position: relative; }
        .saved-card { width: 100%; height: 230px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); position: relative; background-color: #1a1a1a; padding-top: 30px; overflow: hidden; }
        
        .grade-label { position: absolute; top: 0; left: 0; width: 100%; background: #c00; border-bottom: 2px solid #000; color: white; text-align: center; z-index: 20; }
        .grade-title { font-size: 8px; font-weight: 900; padding-top: 4px; }
        .grade-score { font-size: 13px; font-weight: 900; padding-bottom: 4px; }
        .gem-mint { background: linear-gradient(45deg, #D4AF37, #FFDF00, #D4AF37); color: black; }

        .gm-controls { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; width: 100%; }
        .gm-btn { padding: 6px; font-size: 9px; color: #aaa; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
        .gm-btn:hover { border-color: var(--gold); color: white; }

        #battle-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #battle-text { font-size: 4em; color: white; font-weight: 900; margin-top: 30px; text-transform: uppercase; }

        .super-shake { animation: superShake 0.8s infinite; }
        @keyframes superShake { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body onload="initGame()">
    
    <div id="ticker-wrap"><div id="ticker-text">LOADING EWF LIVE DATA... SENTIMENT IS VOLATILE...</div></div>
    <div id="early-access">V6.5 PROMOTER EDITION</div>
    <div id="invasion-banner" onclick="openInvasionModal()">🚨 RIVAL INVASION! DEFEND YOUR TURF! 🚨</div>

    <h1>EWF RIPPED</h1>
    
    <div id="dashboard" class="glass-panel">
        <div id="stats-panel">
            <div id="cash-display">CONTRACT FUNDS: $0</div>
            <div id="income-display">PASSIVE INCOME: $25 / tick</div>
            <div id="sentiment-wrap">
                <div id="sentiment-label"><span>FAN SENTIMENT</span><span id="sentiment-val">50%</span></div>
                <div id="sentiment-bar"><div id="sentiment-fill"></div></div>
            </div>
            <div id="rank-display" style="margin-top:10px; font-size:12px; color:var(--gold);">RANK: ROOKIE PROMOTER</div>
        </div>
        
        <div id="social-feed">
            <div style="font-size:11px; color:cyan; font-weight:900; border-bottom:1px solid #333; margin-bottom:10px; text-transform:uppercase;">📱 EWF Dirt Sheet</div>
            <div id="social-content"></div>
        </div>

        <div id="action-panel">
            <button class="main-btn" style="border-bottom: 3px solid var(--red);" onclick="ripPack(100, 0.15)">STANDARD ($100)</button>
            <button class="main-btn" style="border-bottom: 3px solid var(--gold);" onclick="ripPack(500, 0.65)">SUPER ($500)</button>
            <button class="main-btn" onclick="hardReset()">RESET DATA</button>
        </div>
    </div>
    
    <div id="pack-area"></div>
    <div id="battle-overlay"><div id="battle-card" style="width:300px; height:420px; border-radius:16px; background-size:cover; border:2px solid var(--gold);"></div><div id="battle-text"></div></div>

    <div class="showcase-area">
        <h2 style="color: white; font-weight: 900; letter-spacing: 2px;">MY EWF ROSTER</h2>
        <div id="collection-grid"></div>
    </div>

    <script>
        const totalCards = 23; const folderPath = "rare ewf cards";
        let userCash = parseInt(localStorage.getItem('EWF_Cash')) || 3000;
        let collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
        let sentiment = parseInt(localStorage.getItem('EWF_Sentiment')) || 50;
        let market = { boosted: 1, crashed: 2 };
        let tweets = [];

        const aiRivals = [
            { name: "Billionaire Ted", handle: "@TedMoney", color: "#f1c40f" },
            { name: "The Trashman", handle: "@TrashyPromoter", color: "#95a5a6" },
            { name: "The Scrapper", handle: "@ScrapKing", color: "#e74c3c" }
        ];

        const chatLogic = [
            "Just saw @YOU pass on a Mint 9. Terrible management. 🤡",
            "Why is the EWF roster looking so weak today? Need more Holos.",
            "I'm invading an arena in 5 minutes. Who's ready to lose cash? 🚨",
            "Just ripped a Gem Mint 10. Stay mad. 💸",
            "The stock market for Card #REPLACE is looking crazy right now!",
            "Is it true that @YOU is finally going to Rebirth? About time."
        ];

        function initGame() {
            updateUI(); displayCollection();
            setInterval(tick, 30000);
            setInterval(generateChat, 15000);
        }

        function tick() {
            // Income based on Sentiment Multiplier (0.5x to 2.0x)
            let multiplier = (sentiment / 50);
            let income = Math.floor(25 * multiplier);
            userCash += income;
            
            // Sentiment decays naturally
            sentiment = Math.max(10, sentiment - 1);
            
            saveGame(); updateUI();
        }

        function generateChat() {
            let rival = aiRivals[Math.floor(Math.random() * aiRivals.length)];
            let text = chatLogic[Math.floor(Math.random() * chatLogic.length)].replace("REPLACE", Math.floor(Math.random()*23)+1);
            postTweet(text, rival.handle, rival.color, true);
        }

        function postTweet(text, handle, color, interactive = false) {
            let id = Date.now();
            let replyHtml = interactive ? `<button class="reply-btn" onclick="replyToTweet(${id})">Reply</button>` : "";
            let tweet = `<div class="tweet" id="t-${id}">${replyHtml}<b style="color:${color};">${handle}:</b> <span style="color:#ccc;">${text}</span></div>`;
            tweets.unshift(tweet);
            if(tweets.length > 6) tweets.pop();
            document.getElementById('social-content').innerHTML = tweets.join('');
        }

        function replyToTweet(id) {
            let t = document.getElementById('t-'+id);
            if(t) {
                t.style.opacity = "0.5";
                t.querySelector('.reply-btn').remove();
                sentiment = Math.min(100, sentiment + 8);
                userCash = Math.max(0, userCash - 50); // PR costs money!
                updateUI();
                postTweet("Thanks for the engagement! 📈", "@YOU", "cyan", false);
            }
        }

        function ripPack(cost, holoChance) {
            if(userCash < cost) return alert("Not enough cash!");
            userCash -= cost;
            const area = document.getElementById('pack-area');
            area.innerHTML = `<div id="sealed-pack" onclick="openPack(${holoChance})"><h2>RIP!</h2></div>`;
            updateUI();
        }

        function openPack(holoChance) {
            const area = document.getElementById('pack-area');
            area.innerHTML = "";
            for(let i=0; i<5; i++) {
                let num = Math.floor(Math.random() * totalCards) + 1;
                let holo = Math.random() < holoChance;
                let grade = Math.floor(Math.random() * 4) + 7;
                let card = { img: `card (${num}).jpg`, wins: 0, holo: holo, grade: grade };
                
                const cardDiv = document.createElement('div');
                cardDiv.className = "pack-card";
                if(holo || grade === 10) cardDiv.classList.add('super-shake');
                
                cardDiv.innerHTML = `<div class="card-inner"><div class="back" style="background:url('wrapper.jpg') center/cover;"></div><div class="front" style="background-image:url('${folderPath}/${card.img}'); background-size:cover; border:2px solid ${holo ? 'cyan' : 'white'};"></div></div>`;
                
                cardDiv.onclick = function() {
                    if(!this.classList.contains('flipped')) {
                        this.classList.add('flipped');
                        this.classList.remove('super-shake');
                        collection.push(card);
                        saveGame(); displayCollection();
                        if(holo) sentiment += 5; updateUI();
                    }
                };
                area.appendChild(cardDiv);
            }
        }

        function displayCollection() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = "";
            collection.forEach((card, i) => {
                const container = document.createElement('div');
                container.className = "card-container";
                container.innerHTML = `
                    <div class="saved-card ${card.holo ? 'is-holo' : ''}" style="background-image:url('${folderPath}/${card.img}'); background-size:cover;">
                        <div class="grade-label ${card.grade === 10 ? 'gem-mint' : ''}">
                            <div class="grade-title">EWF AUTHENTIC</div>
                            <div class="grade-score">MINT ${card.grade}</div>
                        </div>
                    </div>
                    <div class="gm-controls">
                        <button class="gm-btn" onclick="runBattle(${i})">FIGHT</button>
                        <button class="gm-btn" onclick="sellCard(${i})">SELL</button>
                    </div>
                `;
                grid.appendChild(container);
            });
        }

        function runBattle(idx) {
            const overlay = document.getElementById('battle-overlay');
            const bText = document.getElementById('battle-text');
            overlay.style.display = 'flex';
            document.getElementById('battle-card').style.backgroundImage = `url('${folderPath}/${collection[idx].img}')`;
            
            setTimeout(() => {
                let win = Math.random() < 0.6;
                if(win) {
                    bText.innerText = "WINNER!";
                    collection[idx].wins++;
                    sentiment = Math.min(100, sentiment + 3);
                } else {
                    bText.innerText = "DEFEAT";
                    sentiment = Math.max(10, sentiment - 5);
                }
                saveGame();
                setTimeout(() => { overlay.style.display='none'; displayCollection(); updateUI(); }, 1200);
            }, 1500);
        }

        function sellCard(idx) {
            userCash += 100;
            collection.splice(idx, 1);
            saveGame(); displayCollection(); updateUI();
        }

        function updateUI() {
            document.getElementById('cash-display').innerText = "CONTRACT FUNDS: $" + userCash.toLocaleString();
            document.getElementById('sentiment-val').innerText = sentiment + "%";
            document.getElementById('sentiment-fill').style.width = sentiment + "%";
            document.getElementById('income-display').innerText = `PASSIVE INCOME: $${Math.floor(25 * (sentiment/50))} / tick`;
        }

        function saveGame() { 
            localStorage.setItem('EWF_Cash', userCash); 
            localStorage.setItem('EWF_Collection', JSON.stringify(collection));
            localStorage.setItem('EWF_Sentiment', sentiment);
        }

        function hardReset() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
