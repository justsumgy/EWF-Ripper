<!DOCTYPE html>
<html>
<head>
    <title>My EWF Collection 2026</title>
    <style>
        body { background: url('background.jpg') center/cover no-repeat fixed; color: white; font-family: 'Arial Black', sans-serif; text-align: center; padding: 20px; border: 5px solid #D4AF37; min-height: 100vh; margin: 0; overflow-x: hidden; }
        h1 { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 3em; margin-bottom: 5px; }
        
        #stats-bar { background: rgba(0,0,0,0.9); border: 2px solid #D4AF37; display: inline-block; padding: 15px 40px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 20px black; }
        #cash-display { color: #00FF00; font-size: 28px; font-weight: bold; }

        #pack-area { margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; min-height: 350px; }
        
        /* THE TILT CONTAINER */
        .card-container { width: 140px; height: 200px; perspective: 600px; display: inline-block; margin: 15px; }
        
        .saved-card { 
            width: 100%; height: 100%; border-radius: 8px; border: 2px solid #D4AF37;
            background-size: cover; background-position: center; 
            position: relative; transition: transform 0.1s ease-out; 
            transform-style: preserve-3d; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* THE HOLO SHINE LAYER */
        .shimmer {
            position: absolute; inset: 0; border-radius: 8px;
            background: linear-gradient(105deg, 
                transparent 20%, 
                rgba(255, 219, 112, 0.4) 45%, 
                rgba(255, 255, 255, 0.6) 50%, 
                rgba(255, 219, 112, 0.4) 55%, 
                transparent 80%
            );
            background-size: 250% 250%; background-position: 100% 100%;
            mix-blend-mode: color-dodge; z-index: 2; pointer-events: none; display: none;
        }
        .is-holo .shimmer { display: block; }

        .win-count { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 25px; height: 25px; font-size: 12px; line-height: 25px; border: 2px solid white; z-index: 10; font-weight: bold; }

        /* PACK CARDS */
        .pack-card { width: 200px; height: 280px; perspective: 1000px; cursor: pointer; display: inline-block; margin: 10px; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative; }
        .pack-card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 10px; border: 3px solid #D4AF37; }
        .back { background: url('wrapper.jpg') center/cover; }
        .front { transform: rotateY(180deg); background-size: cover; background-position: center; }

        #history-box { background: rgba(0,0,0,0.8); border: 1px solid #555; max-width: 400px; margin: 20px auto; padding: 10px; border-radius: 8px; font-size: 13px; }
        .entry { border-bottom: 1px solid #333; padding: 5px; }
        
        button { padding: 12px 25px; font-size: 16px; background: linear-gradient(#e60000, #800000); color: white; border: 2px solid #fff; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
