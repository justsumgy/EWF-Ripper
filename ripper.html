<!DOCTYPE html>
<html>
<head>
    <title>EWF RIPPED (TCG) - SHOWCASE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.5); --dark-glass: rgba(15, 15, 20, 0.85); --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --purple: #9b59b6; }
        * { box-sizing: border-box; } img { max-width: 100%; height: auto; }
        body { background: url('background.jpg') center/cover no-repeat fixed; background-color: #111; color: white; font-family: 'Montserrat', sans-serif; text-align: center; padding: 0; margin: 0; overflow-x: hidden; user-select: none; }
        body.battle-locked { overflow: hidden !important; }

        h1 { color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); font-size: 2.8em; margin: 25px 0 5px 0; font-weight: 900; letter-spacing: -1px; }
        .glass-panel { background: var(--dark-glass); backdrop-filter: blur(12px); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); padding: 20px; }
        
        #dashboard { display: flex; flex-wrap: wrap; justify-content: center; align-items: stretch; gap: 20px; max-width: 1000px; margin: 20px auto; }
        #stats-panel { flex: 1; min-width: 250px; text-align: left; display: flex; flex-direction: column; justify-content: center; position: relative; border-right: 1px solid rgba(255,255,255,0.1); padding-right: 20px;}
        #cash-display { color: var(--green); font-size: 32px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.4); } 
        #rank-display, #season-display { color: var(--gold); margin-top: 10px; font-size: 14px; font-weight: 900; }
        
        #action-panel { flex: 2; min-width: 400px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; align-content: start; }
        .main-btn { padding: 15px 10px; font-size: 12px; font-weight: 900; color: white; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .main-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.5); }
        .rip-std { border-bottom: 3px solid var(--red); } .rip-super { border-bottom: 3px solid var(--gold); } .btn-profile { border-bottom: 3px solid #e0b0ff; }
        
        /* PLAYER PROFILE MODAL */
        .modal { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); width: 700px; max-width: 90vw; max-height: 80vh; overflow-y: auto; background: var(--dark-glass); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 16px; padding: 25px; z-index: 5000; display: none; box-shadow: 0 25px 50px rgba(0,0,0,0.9), 0 0 0 100vw rgba(0,0,0,0.7); text-align: center; } 
        .modal h2 { color: #e0b0ff; margin-top: 0; font-weight: 900; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .close-btn { margin-top:25px; padding:12px; background: rgba(231, 76, 60, 0.1); color: var(--red); border: 1px solid var(--red); font-weight:900; border-radius:8px; cursor:pointer; width: 100%; transition: 0.2s; font-size: 14px; letter-spacing: 1px; } .close-btn:hover { background: var(--red); color: white; box-shadow: 0 0 15px rgba(231,76,60,0.4); }

        /* BINDER & CARDS */
        .showcase-area { background: rgba(0,0,0,0.4); border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px 0; margin-top: 40px; box-shadow: inset 0 0 50px rgba(0,0,0,0.8); min-height: 500px; }
        #binder-controls { display:flex; justify-content:center; gap:20px; align-items:center; margin-bottom: 20px; }
        .binder-btn { background: var(--dark-glass); color: white; border: 1px solid var(--gold); padding: 8px 16px; font-weight: 900; cursor: pointer; border-radius: 6px; transition: 0.2s; } .binder-btn:hover { background: var(--gold); color: black; } .binder-btn:disabled { opacity:0.3; cursor:not-allowed; border-color:#555; }
        
        .card-container { width: 160px; display: inline-flex; flex-direction: column; align-items: center; margin: 15px; vertical-align: top; position: relative; perspective: 1000px; } 
        .saved-card { width: 100%; height: 230px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); position: relative; transition: transform 0.1s ease-out; cursor: pointer; transform-style: preserve-3d; box-shadow: 0 15px 25px rgba(0,0,0,0.6); padding-top: 30px; background-color: #1a1a1a; }
        .saved-card.graded-slab { border: 5px solid #ddd; border-radius: 8px; padding-top: 25px; box-shadow: 5px 5px 15px rgba(0,0,0,0.9); background: linear-gradient(135deg, #eee 0%, #fff 50%, #eee 100%); }
        .is-holo { border-color: cyan !important; box-shadow: 0 0 15px rgba(0,255,255,0.4); }
        .wear-overlay { position:absolute; inset:0; background: url('https://www.transparenttextures.com/patterns/scratched-surface.png'); opacity: 0.5; mix-blend-mode: overlay; pointer-events: none; z-index: 12; border-radius:10px; }
        
        /* CARD SAVER CSS */
        .card-saver-case { border: 2px solid rgba(255,255,255,0.4) !important; padding-top: 15px !important; border-radius: 8px !important; background: rgba(255,255,255,0.1) !important; box-shadow: 0 0 10px rgba(255,255,255,0.2) inset !important; backdrop-filter: blur(2px); }
        .card-saver-lip { position:absolute; top:-15px; left:10px; right:10px; height:15px; background:rgba(255,255,255,0.2); border-top-left-radius: 10px; border-top-right-radius: 10px; border: 1px solid rgba(255,255,255,0.4); border-bottom:none; }
        
        .grade-label { position: absolute; top: 0; left: 0; width: 100%; background: #c00; border-bottom: 2px solid #000; color: white; text-align: center; border-top-left-radius: 8px; border-top-right-radius: 8px; z-index: 20; } .grade-title { font-size: 8px; font-weight: 900; padding-top: 4px; } .grade-score { font-size: 13px; font-weight: 900; padding-bottom: 4px; } .gem-mint { background: linear-gradient(45deg, #D4AF37, #FFDF00, #D4AF37); color: black; }
        .win-count { position: absolute; top: 12px; left: -8px; background: var(--dark-glass); color: white; border-radius: 4px; padding: 4px 8px; font-size: 11px; border: 1px solid rgba(255,255,255,0.2); z-index: 21; font-weight: 900; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .gm-controls { display: flex; flex-direction: column; gap: 4px; margin-top: 12px; width: 100%; } 
        .gm-btn { padding: 6px; font-size: 10px; color: #aaa; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 4px; cursor: pointer; font-weight: 700; transition: all 0.2s; text-transform: uppercase; } 
        .gm-btn:hover { border-color: var(--gold); color: white; background: rgba(255, 255, 255, 0.1); } 

        /* EPIC ARCADE VS SCREEN */
        #vs-overlay { position:fixed; inset:0; z-index: 15000; display:none; overflow:hidden; }
        #vs-left { position:absolute; left:-50%; top:0; width:50%; height:100%; background:linear-gradient(90deg, #000, var(--blue)); display:flex; align-items:center; justify-content:center; transform:skewX(-10deg); transition: left 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); border-right: 5px solid white; box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        #vs-right { position:absolute; right:-50%; top:0; width:50%; height:100%; background:linear-gradient(-90deg, #000, var(--red)); display:flex; align-items:center; justify-content:center; transform:skewX(-10deg); transition: right 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); border-left: 5px solid white; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        #vs-text { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%) scale(0); font-size:100px; font-weight:900; color:var(--gold); font-style:italic; text-shadow: 5px 5px 0 #000, 0 0 30px var(--gold); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index:15001;}
        .vs-active #vs-left { left: -5%; } .vs-active #vs-right { right: -5%; } .vs-active #vs-text { transform: translate(-50%, -50%) scale(1); }
        .vs-card-img { width: 220px; height: 300px; border-radius:10px; border:3px solid white; box-shadow: 0 0 30px black; transform:skewX(10deg); background-size:cover; }

        /* BATTLE OVERLAY & D20 */
        #battle-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; } 
        #battle-card { width: 300px; height: 420px; border: 2px solid var(--gold); border-radius: 16px; background-size: cover; background-position: center; z-index: 1001; box-shadow: 0 0 50px rgba(212,175,55,0.4); } 
        #battle-text { font-size: 4em; color: white; font-weight: 900; text-shadow: 0 5px 20px rgba(0,0,0,0.8); margin-top: 30px; z-index: 1001; text-align: center; text-transform: uppercase; letter-spacing: 2px; } 
        #d20-display { font-size: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 15px rgba(255,255,255,0.8)); display: none; font-weight:900; } 
        .d20-roll-anim { animation: spinDie 0.3s linear infinite; } @keyframes spinDie { 0% { transform: translateY(-5px) scale(0.9); } 50% { transform: translateY(5px) scale(1.1); } 100% { transform: translateY(-5px) scale(0.9); } }
        .screen-shake { animation: screenShake 0.15s linear; } @keyframes screenShake { 0% { transform: translate(10px,10px) rotate(1deg); } 25% { transform: translate(-10px,-5px) rotate(-1deg); } 50% { transform: translate(5px,-10px) rotate(1deg); } 75% { transform: translate(-5px,10px) rotate(-1deg); } 100% { transform: translate(0,0); } } 
        .particle-spark { position:absolute; width:10px; height:10px; background:white; border-radius:50%; z-index:20000; box-shadow: 0 0 10px white, 0 0 20px yellow; animation: sparkOut 0.8s ease-out forwards; } @keyframes sparkOut { 0% { transform: scale(1) translate(0,0); opacity:1; } 100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity:0; } }

        /* PACK RIPPING */
        #pack-area { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 250px; align-items: center; } 
        #sealed-pack { width: 200px; height: 300px; background: linear-gradient(135deg, #d4af37, #ffd700, #8a6d3b); border: 2px solid white; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 30px rgba(0,0,0,0.5); transition: 0.2s; position: relative; overflow: hidden; } 
        #sealed-pack:hover { transform: scale(1.05) translateY(-5px); }
        .pack-tear-anim { animation: packTear 1s forwards cubic-bezier(0.1, 0.8, 0.2, 1); pointer-events:none; } @keyframes packTear { 0% { transform: scale(1.05) translateY(-5px); clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); opacity:1; } 50% { clip-path: polygon(0 0, 50% 10%, 100% 0, 100% 100%, 50% 90%, 0 100%); transform: scale(1.1); filter:brightness(1.5); } 100% { clip-path: polygon(0 0, 50% 50%, 100% 0, 100% 100%, 50% 50%, 0 100%); transform: scale(1.2) translateY(50px); opacity:0; } }
    </style>
</head>
<body onload="initGame()">
    
    <div id="vs-overlay"><div id="vs-left"><div id="vs-card-left" class="vs-card-img"></div></div><div id="vs-right"><div id="vs-card-right" class="vs-card-img"></div></div><div id="vs-text">VS</div></div>
    <div id="battle-overlay"><div id="d20-display">🎲 20</div><div id="battle-card"></div><div id="battle-text">FIGHTING...</div></div>

    <div id="profile-modal" class="modal">
        <h2>👔 GENERAL MANAGER PROFILE</h2>
        <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.5); padding:15px; border-radius:8px; margin-bottom:20px; border:1px solid rgba(255,255,255,0.1);">
            <div><div style="font-size:10px; color:#aaa; letter-spacing:1px;">CAREER RECORD</div><div style="font-size:24px; font-weight:900;"><span style="color:var(--green);" id="prof-w">0</span> - <span style="color:var(--red);" id="prof-l">0</span></div></div>
            <div><div style="font-size:10px; color:#aaa; letter-spacing:1px;">WIN RATE</div><div style="font-size:24px; font-weight:900; color:cyan;" id="prof-wr">0%</div></div>
            <div><div style="font-size:10px; color:#aaa; letter-spacing:1px;">LIFETIME EARNINGS</div><div style="font-size:24px; font-weight:900; color:var(--gold);" id="prof-cash">$0</div></div>
        </div>
        <h3 style="color:var(--gold); margin-bottom:10px; letter-spacing:2px;">🏆 THE TROPHY ROOM 🏆</h3>
        <div style="font-size:12px; color:#aaa; margin-bottom:15px;">Your Top 3 Most Valuable Assets</div>
        <div id="trophy-grid" style="display:flex; justify-content:center; gap:20px; min-height:200px;"></div>
        <button class="close-btn" onclick="document.getElementById('profile-modal').style.display='none'">CLOSE PROFILE</button>
    </div>

    <h1>EWF RIPPED</h1>
    
    <div id="dashboard" class="glass-panel">
        <div id="stats-panel">
            <div style="font-size:11px; color:#888; text-transform:uppercase; font-weight:900; letter-spacing:1px;">Treasury</div>
            <div id="cash-display">CONTRACT FUNDS: $0</div>
            <div id="rank-display">RANK: ROOKIE PROMOTER</div>
        </div>
        <div id="action-panel">
            <button class="main-btn rip-std" onclick="ripPack(5, 0.05)">STANDARD PACK ($4.99)</button>
            <button class="main-btn rip-super" onclick="ripPack(25, 0.25)">SUPER HOLO ($24.99)</button>
            <button class="main-btn btn-profile" onclick="openProfile()">👔 GM PROFILE</button>
        </div>
    </div>
    
    <div id="pack-area"></div>

    <div class="showcase-area">
        <h2 style="color: white; margin-top: 0; font-weight: 900; letter-spacing: 2px;">THE PLAYER BINDER</h2>
        <div id="binder-controls">
            <button class="binder-btn" id="page-prev" onclick="changePage(-1)">◀ PREV PAGE</button>
            <span id="page-indicator" style="font-weight:bold; color:#aaa; font-size:14px;">PAGE 1 / 1</span>
            <button class="binder-btn" id="page-next" onclick="changePage(1)">NEXT PAGE ▶</button>
        </div>
        <div id="collection-grid" style="display:flex; justify-content:center; gap:10px; flex-wrap:wrap; max-width:1200px; margin:0 auto;"></div>
    </div>

    <script>
        const totalCards = 38; const folderPath = "rare ewf cards";
        function getCardDropNum() { let num; let valid = false; while(!valid) { num = Math.floor(Math.random() * totalCards) + 1; if (num === 32 && Math.random() < 0.01) valid = true; else if ((num === 30 || num === 36) && Math.random() < 0.05) valid = true; else valid = true; } return num; }
        
        let userCash = parseInt(localStorage.getItem('EWF_Cash')) || 50;
        let lifetimeCash = parseInt(localStorage.getItem('EWF_Lifetime')) || userCash;
        let totalWins = parseInt(localStorage.getItem('EWF_Wins')) || 0; let totalLosses = parseInt(localStorage.getItem('EWF_Losses')) || 0;
        let currentPage = 0; const cardsPerPage = 12;

        function initGame() { updateUI(); buildBinder(); setInterval(() => { fastTick(); }, 1000); }
        
        function fastTick() { 
            const now = Date.now(); let needsRender = false; let col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            col.forEach((c) => { 
                if(c.gradingUntil > 0 && now >= c.gradingUntil) { c.gradingUntil = 0; c.raw = false; needsRender = true; if(Math.random() > 0.95 && c.conditionCap === 10) c.grade = 10; else if(c.conditionCap >= 8) c.grade = 8; else c.grade = 7; }
            });
            if(needsRender) { localStorage.setItem('EWF_Collection', JSON.stringify(col)); buildBinder(); }
        }

        // BINDER LOGIC
        function changePage(dir) { currentPage += dir; buildBinder(); }
        function buildBinder() {
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            const totalPages = Math.max(1, Math.ceil(col.length / cardsPerPage));
            if(currentPage >= totalPages) currentPage = totalPages - 1; if(currentPage < 0) currentPage = 0;
            document.getElementById('page-indicator').innerText = `PAGE ${currentPage+1} / ${totalPages}`;
            document.getElementById('page-prev').disabled = currentPage === 0; document.getElementById('page-next').disabled = currentPage >= totalPages - 1;
            
            const grid = document.getElementById('collection-grid'); grid.innerHTML = ''; const now = Date.now();
            let pageSlice = col.slice(currentPage * cardsPerPage, (currentPage + 1) * cardsPerPage);
            pageSlice.forEach((card, index) => { grid.appendChild(createCardElement(card, (currentPage * cardsPerPage) + index, now)); });
        }

        function createCardElement(card, index, now, isStatic = false) {
            const container = document.createElement('div'); container.className = 'card-container'; const cardDiv = document.createElement('div');
            let isGrading = card.gradingUntil > now; 
            cardDiv.className = `saved-card ${card.raw ? '' : 'graded-slab'} ${card.holo ? 'is-holo' : ''} ${isGrading ? 'card-saver-case' : ''}`;
            
            let gradeHtml = card.raw ? `<div class="grade-label" style="background:#555;"><div class="grade-score" style="padding:4px 0;">RAW UNGRADED</div></div>` : `<div class="grade-label ${card.grade === 10 ? 'gem-mint' : ''}"><div class="grade-title">EWF AUTHENTIC</div><div class="grade-score">MINT ${card.grade}</div></div>`;
            let wearHtml = (card.raw && card.conditionCap < 10) ? `<div class="wear-overlay"></div>` : '';
            let envelopeHtml = isGrading ? `<div class="card-saver-lip"></div><div style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-weight:bold; color:black; z-index:40;">GRADING...</div>` : '';

            cardDiv.innerHTML = `${gradeHtml}<div style="position:absolute; top:30px; left:0; right:0; bottom:0; background-image: url('${folderPath}/${card.img}'); background-size: cover; background-position: center; border-radius: 4px; z-index: 10; overflow: hidden;">${wearHtml}</div><div class="win-count">${card.wins} W</div>${envelopeHtml}`;
            
            const update = (e) => { const rect = cardDiv.getBoundingClientRect(); const x = (e.clientX) - rect.left; const y = (e.clientY) - rect.top; cardDiv.style.transform = `rotateX(${((rect.height/2)-y)/10}deg) rotateY(${(x-(rect.width/2))/10}deg) scale(1.05)`; };
            cardDiv.addEventListener('mousemove', update); cardDiv.addEventListener('mouseleave', () => { cardDiv.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)"; });
            
            if(!isGrading && !isStatic) cardDiv.ondblclick = () => runBattle(index);
            container.appendChild(cardDiv);

            if(!isGrading && !isStatic) {
                const controls = document.createElement('div'); controls.className = 'gm-controls';
                if(card.raw) controls.innerHTML = `<button class="gm-btn" style="background:rgba(231,76,60,0.2); color:white;" onclick="sellCard(${index})">SELL ($${getCardValue(card)})</button><button class="gm-btn" style="background:rgba(212,175,55,0.2); color:var(--gold);" onclick="sendToGrading(${index})">📦 GRADE ($25)</button>`;
                else controls.innerHTML = `<button class="gm-btn" style="background:rgba(231,76,60,0.2); color:white;" onclick="sellCard(${index})">SELL ($${getCardValue(card)})</button>`;
                container.appendChild(controls);
            }
            return container;
        }

        // BATTLE & ARCADE VS LOGIC
        function runBattle(idx) {
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || []; let card = col[idx]; 
            const overlay = document.getElementById('battle-overlay'); const bCard = document.getElementById('battle-card'); const bText = document.getElementById('battle-text'); const d20El = document.getElementById('d20-display'); 
            
            const vsOverlay = document.getElementById('vs-overlay'); const vsLeft = document.getElementById('vs-card-left'); const vsRight = document.getElementById('vs-card-right');
            vsLeft.style.backgroundImage = `url('${folderPath}/${card.img}')`; vsRight.style.backgroundImage = `url('${folderPath}/card (${getCardDropNum()}).jpg')`;
            vsOverlay.style.display = 'block'; setTimeout(() => vsOverlay.classList.add('vs-active'), 50);
            
            setTimeout(() => {
                vsOverlay.classList.remove('vs-active'); setTimeout(() => vsOverlay.style.display = 'none', 500);
                document.body.classList.add('battle-locked'); overlay.style.display = 'flex'; bCard.style.backgroundImage = `url('${folderPath}/${card.img}')`; bText.innerHTML = "ROLLING..."; bText.style.color = "white"; d20El.style.display = 'block'; d20El.classList.add('d20-roll-anim');
                
                let rollCount = 0; let rollInt = setInterval(() => { d20El.innerHTML = `🎲 ${Math.floor(Math.random()*20)+1}`; rollCount++; if(rollCount > 10) { clearInterval(rollInt); resolveBattle(idx, col, card, overlay, bText, d20El); } }, 100);
            }, 1500);
        }
        function resolveBattle(idx, col, card, overlay, bText, d20El) {
            d20El.classList.remove('d20-roll-anim'); let d20 = Math.floor(Math.random() * 20) + 1; d20El.innerHTML = `🎲 ${d20}`;
            let isCrit = (d20 >= 18); let isBotch = (d20 <= 3); let win = d20 >= 10;
            
            if(card.raw && Math.random() < 0.2) { card.conditionCap = Math.max(1, card.conditionCap - 1); } 

            if(win) { 
                bText.innerHTML = isCrit ? "CRITICAL WIN!" : "WINNER!"; bText.style.color = "var(--green)"; card.wins++; totalWins++; 
                if(isCrit) { spawnSparks(d20El); document.body.classList.add('screen-shake'); } 
                let payout = Math.floor(Math.random() * 40) + 10; userCash += payout; lifetimeCash += payout;
            } else { 
                bText.innerHTML = isBotch ? "CRITICAL BOTCH!" : "DEFEAT"; bText.style.color = "var(--red)"; totalLosses++; 
                if(isBotch) { document.body.classList.add('screen-shake'); }
            }
            localStorage.setItem('EWF_Wins', totalWins); localStorage.setItem('EWF_Losses', totalLosses); localStorage.setItem('EWF_Collection', JSON.stringify(col)); localStorage.setItem('EWF_Lifetime', lifetimeCash); saveGame();
            setTimeout(() => { overlay.style.display = 'none'; document.body.classList.remove('battle-locked'); d20El.style.display = 'none'; updateUI(); buildBinder(); }, 2000);
        }

        function spawnSparks(el) { const rect = el.getBoundingClientRect(); for(let i=0; i<30; i++) { let s = document.createElement('div'); s.className = 'particle-spark'; s.style.left = (rect.left + rect.width/2) + 'px'; s.style.top = (rect.top + rect.height/2) + 'px'; s.style.setProperty('--tx', `${(Math.random()-0.5)*300}px`); s.style.setProperty('--ty', `${(Math.random()-0.5)*300}px`); document.body.appendChild(s); setTimeout(()=>s.remove(), 800); } }
        
        function openProfile() { 
            document.getElementById('prof-w').innerText = totalWins; document.getElementById('prof-l').innerText = totalLosses; document.getElementById('prof-wr').innerText = `${totalWins+totalLosses===0?0:Math.round((totalWins/(totalWins+totalLosses))*100)}%`; document.getElementById('prof-cash').innerText = `$${lifetimeCash}`; 
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || []; 
            let sorted = [...col].sort((a,b)=>getCardValue(b)-getCardValue(a)).slice(0,3); let tg = document.getElementById('trophy-grid'); tg.innerHTML=''; sorted.forEach(c=>tg.appendChild(createCardElement(c, 0, Date.now(), true)));
            document.getElementById('profile-modal').style.display='block'; 
        }

        // PACK RIPPING
        function ripPack(cost, baseHoloChance) { if(userCash<cost) return; userCash-=cost; saveGame(); updateUI(); let area = document.getElementById('pack-area'); area.innerHTML = `<div id="sealed-pack" onclick="openSealedPack(${baseHoloChance})"><h2 style="color:black; font-size:28px; transform:rotate(-10deg); font-weight:900;">RIP PACK!</h2></div>`; }
        function openSealedPack(chance) { let pack = document.getElementById('sealed-pack'); if(!pack) return; pack.classList.add('pack-tear-anim'); 
            setTimeout(()=>{ document.getElementById('pack-area').innerHTML=''; for(let i=0;i<3;i++) { let isHolo = Math.random() < chance; let c = { img: `card (${getCardDropNum()}).jpg`, wins:0, holo:isHolo, raw:true, grade:null, conditionCap:10, gradingUntil:0 }; saveCard(c); } buildBinder(); }, 500); }

        function saveCard(c) { let col = JSON.parse(localStorage.getItem('EWF_Collection'))||[]; col.push(c); localStorage.setItem('EWF_Collection', JSON.stringify(col)); }
        function sellCard(idx) { let col = JSON.parse(localStorage.getItem('EWF_Collection')); userCash += getCardValue(col[idx]); col.splice(idx,1); localStorage.setItem('EWF_Collection', JSON.stringify(col)); saveGame(); updateUI(); buildBinder(); }
        function sendToGrading(idx) { if(userCash<25) return; userCash-=25; let col = JSON.parse(localStorage.getItem('EWF_Collection')); col[idx].gradingUntil = Date.now() + 15000; localStorage.setItem('EWF_Collection', JSON.stringify(col)); saveGame(); updateUI(); buildBinder(); }
        function getCardValue(c) { let base = c.raw?2:(c.grade===10?50:(c.grade===9?10:4)); let t=c.holo?base*4:base; return Math.floor(t); }
        function saveGame() { localStorage.setItem('EWF_Cash', userCash); localStorage.setItem('EWF_Lifetime', lifetimeCash); document.getElementById('cash-display').innerHTML = `CONTRACT FUNDS: $${userCash}`; }
        function updateUI() { saveGame(); }
    </script>
</body>
</html>
