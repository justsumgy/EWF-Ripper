<!DOCTYPE html>
<html>
<head>
    <title>My EWF Collection 2026</title>
    <style>
        body { 
            background: url('background.jpg') center/cover no-repeat fixed; 
            color: white; font-family: 'Arial Black', sans-serif; text-align: center; padding: 20px;
            border: 5px solid #D4AF37; min-height: 100vh; margin: 0; overflow-x: hidden;
        }
        h1 { color: #D4AF37; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); font-size: 3em; margin-bottom: 5px; }
        
        #stats-bar { background: rgba(0,0,0,0.9); border: 2px solid #D4AF37; display: inline-block; padding: 15px 40px; border-radius: 10px; margin-bottom: 20px; }
        #cash-display { color: #00FF00; font-size: 28px; font-weight: bold; display: block; }
        #rank-display { color: #D4AF37; font-size: 18px; display: block; margin-top: 5px; letter-spacing: 2px; }

        #pack-area { margin-top: 30px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; min-height: 350px; }
        
        /* CARD BASICS */
        .card { width: 220px; height: 320px; perspective: 1000px; cursor: pointer; position: relative; }
        .card-inner { width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 12px; border: 3px solid #D4AF37; box-shadow: 0 10px 20px rgba(0,0,0,0.7); }
        .back { background: url('wrapper.jpg') center/cover; background-color: #111; }
        .front { transform: rotateY(180deg); background-size: cover; background-position: center; }

        .grade-tag { position: absolute; top: 10px; left: 10px; background: white; color: black; padding: 2px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; border: 1px solid #333; z-index: 5; }

        button { padding: 15px 30px; font-size: 18px; background: linear-gradient(#e60000, #800000); color: white; border: 2px solid #fff; cursor: pointer; border-radius: 8px; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; opacity: 0.5; }

        .saved-card { width: 140px; height: 200px; border-radius: 8px; background-size: cover; border: 2px solid #D4AF37; transition: 0.3s; position: relative; display: inline-block; margin: 10px; cursor: pointer; }
        .win-count { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 25px; height: 25px; font-size: 12px; line-height: 25px; border: 2px solid white; font-weight: bold; z-index: 10; }
        
        /* BATTLE OVERLAY */
        #battle-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #battle-card { width: 280px; height: 400px; border-radius: 15px; border: 5px solid gold; background-size: cover; background-position: center; transition: 0.5s; }
        #battle-text { font-size: 4em; color: gold; text-shadow: 0 0 20px red; margin-top: 20px; font-style: italic; }

        /* VFX CLASSES */
        .vfx-dot { position: fixed; width: 8px; height: 8px; background: #FFD700; border-radius: 50%; pointer-events: none; z-index: 9999; box-shadow: 0 0 10px #FFD700; }
        @keyframes rumble { 0% { transform: translate(0,0); } 25% { transform: translate(5px,5px); } 50% { transform: translate(-5px,-5px); } 100% { transform: translate(0,0); } }
        .rumble { animation: rumble 0.1s linear infinite; }
        .win-glow { box-shadow: 0 0 50px lime !important; transform: scale(1.1); }
        .lose-dark { filter: grayscale(1) brightness(0.5); transform: scale(0.9); }
    </style>
</head>
<body onload="initGame()">
    
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <audio id="cheerSound"><source src="cheer.mp3" type="audio/mpeg"></audio>

    <div id="battle-overlay">
        <div id="battle-card"></div>
        <div id="battle-text">FIGHT!</div>
    </div>

    <h1>ELITE WRESTLING FEDERATION</h1>
    <h2>SERIES 1: 2026 EDITION</h2>
    
    <div id="stats-bar">
        <div id="cash-display">CONTRACT FUNDS: $0</div>
        <div id="rank-display">RANK: ROOKIE PROMOTER</div>
        <button style="background: #222; font-size: 10px; padding: 5px; margin-top: 10px; border: 1px solid #555;" onclick="clearEverything()">RESET ALL DATA</button>
    </div>
    <br>
    <button id="rip-btn" onclick="ripPack()">RIP 2026 PACK ($100)</button>
    
    <div id="pack-area"></div>

    <h2 id="collection-title" style="color: gold; margin-top: 50px; border-top: 2px solid gold; padding-top: 20px;">MY EWF COLLECTION (0 / 23)</h2>
    <div id="collection-grid"></div>

    <h1 style="color: #ff4500; text-shadow: 0 0 20px #ff4500; margin-top: 80px;">🏆 HALL OF FAME 🏆</h1>
    <div id="hof-grid"></div>

    <script>
        const totalCards = 23; 
        const folderPath = "rare ewf cards"; 
        let userCash = parseInt(localStorage.getItem('EWF_Cash'));
        if (isNaN(userCash)) userCash = 300; 
        let musicStarted = false;

        function initGame() {
            updateUI();
            displayCollection();
            setInterval(() => { userCash += 15; saveGame(); updateUI(); }, 30000); 
        }

        // --- PARTICLE BURST ---
        function spark(element) {
            const rect = element.getBoundingClientRect();
            const centerX = rect.left + (rect.width / 2);
            const centerY = rect.top + (rect.height / 2);
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement('div');
                dot.className = 'vfx-dot';
                dot.style.left = centerX + 'px';
                dot.style.top = centerY + 'px';
                document.body.appendChild(dot);
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 10 + 5;
                let curX = 0, curY = 0, opacity = 1;
                const anim = setInterval(() => {
                    curX += Math.cos(angle) * dist;
                    curY += Math.sin(angle) * dist + 1.5;
                    opacity -= 0.04;
                    dot.style.transform = `translate(${curX}px, ${curY}px)`;
                    dot.style.opacity = opacity;
                    if (opacity <= 0) { clearInterval(anim); dot.remove(); }
                }, 20);
            }
        }

        function updateUI() {
            document.getElementById('cash-display').innerHTML = `CONTRACT FUNDS: $${userCash}`;
            document.getElementById('rip-btn').disabled = (userCash < 100);
            const col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            let r = "ROOKIE PROMOTER";
            if (col.length >= 19) r = "LEGENDARY COLLECTOR";
            else if (col.length >= 13) r = "ELITE EXECUTIVE";
            else if (col.length >= 6) r = "PRO MANAGER";
            document.getElementById('rank-display').innerHTML = `RANK: ${r}`;
        }

        function saveGame() { localStorage.setItem('EWF_Cash', userCash); }

        function ripPack() {
            if (userCash < 100) return;
            userCash -= 100;
            saveGame(); updateUI();
            if (!musicStarted) {
                document.getElementById("bgMusic").volume = 0.2;
                document.getElementById("bgMusic").play().catch(e => {});
                musicStarted = true;
            }
            document.getElementById("cheerSound").currentTime = 0;
            document.getElementById("cheerSound").play();
            const area = document.getElementById('pack-area');
            area.innerHTML = ''; 
            for (let i = 0; i < 5; i++) {
                const randomNum = Math.floor(Math.random() * totalCards) + 1;
                const fileName = `card (${randomNum}).jpg`; 
                const grade = Math.floor(Math.random() * 4) + 7;
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                cardDiv.innerHTML = `
                    <div class="card-inner" onclick="this.parentElement.classList.toggle('flipped'); saveCard('${fileName}', ${grade}); spark(this)">
                        <div class="back"></div>
                        <div class="front" style="background-image: url('${folderPath}/${fileName}')">
                            <div class="grade-tag">PSA ${grade}</div>
                        </div>
                    </div>`;
                area.appendChild(cardDiv);
            }
        }

        function saveCard(img, grade) {
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            const exists = col.find(c => c.img === img);
            if (!exists) {
                col.push({ img: img, wins: 0, hof: false, grade: grade });
                localStorage.setItem('EWF_Collection', JSON.stringify(col));
                displayCollection(); updateUI();
            } else { userCash += 50; saveGame(); updateUI(); }
        }

        // --- NEW BATTLE SYSTEM ---
        function startMatch(cardImg, cardIndex) {
            const overlay = document.getElementById('battle-overlay');
            const bCard = document.getElementById('battle-card');
            const bText = document.getElementById('battle-text');
            let col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            
            overlay.style.display = 'flex';
            bCard.style.backgroundImage = `url('${folderPath}/${cardImg}')`;
            bCard.className = 'rumble';
            bText.innerHTML = "FIGHTING...";
            bText.style.color = "white";

            setTimeout(() => {
                bCard.classList.remove('rumble');
                const win = Math.random() > 0.5;
                
                if (win) {
                    bCard.classList.add('win-glow');
                    bText.innerHTML = "WINNER!";
                    bText.style.color = "#00FF00";
                    col[cardIndex].wins++;
                    if(col[cardIndex].wins >= 100) col[cardIndex].hof = true;
                } else {
                    bCard.classList.add('lose-dark');
                    bText.innerHTML = "DEFEAT";
                    bText.style.color = "red";
                }

                localStorage.setItem('EWF_Collection', JSON.stringify(col));

                setTimeout(() => {
                    overlay.style.display = 'none';
                    bCard.className = '';
                    displayCollection();
                }, 2000);

            }, 1500);
        }

        function displayCollection() {
            const grid = document.getElementById('collection-grid');
            const hofGrid = document.getElementById('hof-grid');
            const col = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
            document.getElementById('collection-title').innerHTML = `MY EWF COLLECTION (${col.length} / ${totalCards})`;
            grid.innerHTML = ''; hofGrid.innerHTML = '';
            
            col.forEach((card, index) => {
                const div = document.createElement('div');
                div.className = `saved-card ${card.hof ? 'hof-card' : ''}`;
                div.style.backgroundImage = `url('${folderPath}/${card.img}')`;
                div.innerHTML = `<div class="grade-tag" style="font-size:9px; top:5px; left:5px; padding:1px 4px;">PSA ${card.grade || 10}</div>`;
                
                if (card.hof) {
                    div.innerHTML += `<div class="win-count" style="background: gold; color: black;">100</div>`;
                    hofGrid.appendChild(div);
                } else {
                    div.onclick = () => startMatch(card.img, index);
                    if(card.wins > 0) div.innerHTML += `<div class="win-count">${card.wins}</div>`;
                    grid.appendChild(div);
                }
            });
        }

        function clearEverything() { if(confirm("RESET ALL?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
