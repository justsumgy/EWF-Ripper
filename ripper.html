<!DOCTYPE html>
<html>
<head>
    <title>EWF RIPPED (TCG) - v6.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37; --gold-glow: rgba(212, 175, 55, 0.5);
            --dark-glass: rgba(15, 15, 20, 0.85);
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --purple: #9b59b6;
        }

        body { background: url('background.jpg') center/cover no-repeat fixed; background-color: #111; color: white; font-family: 'Montserrat', sans-serif; text-align: center; padding: 0; margin: 0; overflow-x: hidden; user-select: none; transition: background 1s ease-in-out, box-shadow 0.5s; }
        
        #ticker-wrap { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold); padding: 8px; overflow: hidden; white-space: nowrap; font-size: 13px; color: #ddd; position: relative; z-index: 1000; letter-spacing: 2px; text-transform: uppercase; }
        #ticker-text { display: inline-block; animation: scroll-ticker 40s linear infinite; font-weight: 700; }
        @keyframes scroll-ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }

        #invasion-banner { position: fixed; top: 0; left: 0; width: 100%; background: #8b0000; border-bottom: 3px solid #ff0000; color: white; font-size: 20px; font-weight: 900; padding: 12px; z-index: 10000; display: none; cursor: pointer; animation: flash-red 1s infinite alternate; text-shadow: 0 0 10px black; text-transform: uppercase; }
        @keyframes flash-red { from { background: #8b0000; box-shadow: 0 0 20px red; } to { background: #ff0000; box-shadow: 0 0 50px red; } }

        h1 { color: var(--gold); text-shadow: 0 0 15px var(--gold-glow); font-size: 2.8em; margin: 25px 0 5px 0; font-weight: 900; letter-spacing: -1px; }
        
        .glass-panel { background: var(--dark-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1); padding: 20px; }
        
        #dashboard { display: flex; flex-wrap: wrap; justify-content: center; align-items: stretch; gap: 20px; max-width: 1200px; margin: 20px auto; }
        
        #stats-panel { flex: 1; min-width: 250px; text-align: left; display: flex; flex-direction: column; justify-content: center; }
        #cash-display { color: var(--green); font-size: 32px; font-weight: 900; letter-spacing: 1px; text-shadow: 0 0 10px rgba(46, 204, 113, 0.4); }
        #income-display { color: #aaa; font-size: 13px; margin-top: 5px; font-weight: 700; letter-spacing: 1px; }
        
        /* SENTIMENT METER STYLES */
        #sentiment-container { margin-top: 15px; }
        .sentiment-label { font-size: 10px; font-weight: 900; color: cyan; letter-spacing: 1px; display: flex; justify-content: space-between; }
        #sentiment-bar-bg { width: 100%; height: 8px; background: #222; border-radius: 4px; margin-top: 5px; overflow: hidden; border: 1px solid #333; }
        #sentiment-fill { height: 100%; width: 50%; background: linear-gradient(90deg, #e74c3c, #f1c40f, #2ecc71); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #social-feed { flex: 1; min-width: 250px; text-align: left; position: relative; overflow: hidden; display: flex; flex-direction: column; max-height: 250px; }
        .tweet { font-size: 11px; margin-bottom: 8px; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; animation: slideInFeed 0.3s ease-out forwards; }
        .reply-btn { background: rgba(0, 255, 255, 0.1); border: 1px solid cyan; color: cyan; font-size: 8px; padding: 2px 6px; border-radius: 4px; cursor: pointer; float: right; font-weight: 900; text-transform: uppercase; margin-left: 5px; }
        .reply-btn:hover { background: cyan; color: black; }

        #action-panel { flex: 2; min-width: 400px; display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; align-content: start; }
        .main-btn { padding: 12px 10px; font-size: 11px; font-weight: 900; color: white; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .main-btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.5); }
        .main-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .card-container { width: 160px; min-height: 460px; height: auto; perspective: 1000px; display: inline-flex; flex-direction: column; align-items: center; margin: 15px; vertical-align: top; position: relative; padding-bottom: 10px; }
        .saved-card { width: 100%; height: 230px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); position: relative; transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; cursor: pointer; transform-style: preserve-3d; box-shadow: 0 15px 25px rgba(0,0,0,0.6); padding-top: 30px; background-color: #1a1a1a; flex-shrink: 0; }
        
        #early-access { position: fixed; top: 60px; left: 20px; background: var(--red); color: white; padding: 6px 10px; font-weight: 900; border-radius: 4px; font-size: 11px; z-index: 9999; letter-spacing: 1px; pointer-events: none; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .grade-label { position: absolute; top: 0; left: 0; width: 100%; background: #c00; border-bottom: 2px solid #000; color: white; text-align: center; border-top-left-radius: 10px; border-top-right-radius: 10px; z-index: 20; pointer-events: none; }
        .gem-mint { background: linear-gradient(45deg, #D4AF37, #FFDF00, #D4AF37); color: black; }

        #battle-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        #battle-card { width: 300px; height: 420px; border: 2px solid var(--gold); border-radius: 16px; background-size: cover; background-position: center; z-index: 1001; box-shadow: 0 0 50px rgba(212,175,55,0.4); pointer-events: none; }
        #battle-text { font-size: 4em; color: white; font-weight: 900; text-shadow: 0 5px 20px rgba(0,0,0,0.8); margin-top: 30px; z-index: 1001; text-align: center; pointer-events: none; text-transform: uppercase; letter-spacing: 2px; }

        .rumble { animation: rumble 0.1s linear infinite; }
        @keyframes rumble { 0% { transform: translate(3px,3px); } 50% { transform: translate(-3px,-3px); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body onload="initGame()">
    
    <div id="ticker-wrap"><div id="ticker-text">LOADING EWF STOCK MARKET DATA...</div></div>
    <div id="invasion-banner" onclick="openInvasionModal()">🚨 <span id="invasion-name">A RIVAL</span> IS INVADING! CLICK TO DEFEND TERRITORY! (<span id="invasion-time">5:00</span>) 🚨</div>
    <div id="early-access">V6.5 FAN EDITION</div>
    
    <h1>EWF RIPPED</h1>

    <div id="dashboard" class="glass-panel">
        <div id="stats-panel">
            <div id="cash-display">CONTRACT FUNDS: $0</div>
            <div id="income-display">PASSIVE INCOME: $25 / tick</div>
            
            <div id="sentiment-container">
                <div class="sentiment-label">
                    <span>FAN SENTIMENT</span>
                    <span id="sentiment-text">50% (1.0x)</span>
                </div>
                <div id="sentiment-bar-bg"><div id="sentiment-fill"></div></div>
            </div>

            <div id="rank-display" style="margin-top:10px;">RANK: ROOKIE PROMOTER</div>
        </div>
        
        <div id="social-feed">
            <div style="font-size:11px; color:cyan; text-transform:uppercase; font-weight:900; border-bottom:1px solid rgba(0,255,255,0.2); padding-bottom:5px; margin-bottom:10px;">📱 EWF Dirt Sheet (Live)</div>
            <div id="social-content"></div>
        </div>

        <div id="action-panel">
            <button class="main-btn rip-std" onclick="ripPack(100, 0.15)">STANDARD PACK ($100)</button>
            <button class="main-btn rip-super" onclick="ripPack(500, 0.65)">SUPER HOLO ($500)</button>
            <button class="main-btn btn-vault" onclick="openVault()">💼 VAULT</button>
            <button class="main-btn btn-bounty" onclick="openBounties()">📋 BOUNTIES</button>
            <button class="main-btn" onclick="hardReset()">RESET DATA</button>
        </div>
    </div>

    <div id="pack-area"></div>
    <div id="battle-overlay" onclick="this.style.display='none';"><div id="battle-card"></div><div id="battle-text">FIGHTING...</div></div>

    <div class="showcase-area">
        <h2 style="color: white; font-weight: 900; letter-spacing: 2px;">MY EWF ROSTER</h2>
        <div id="collection-grid"></div>
    </div>

    <script>
        const totalCards = 23; const folderPath = "rare ewf cards";
        let userCash = parseInt(localStorage.getItem('EWF_Cash')) || 3000;
        let totalWins = parseInt(localStorage.getItem('EWF_Wins')) || 0;
        let totalLosses = parseInt(localStorage.getItem('EWF_Losses')) || 0;
        let collection = JSON.parse(localStorage.getItem('EWF_Collection')) || [];
        let sentiment = parseInt(localStorage.getItem('EWF_Sentiment')) || 50; // 0 to 100
        let fanDemand = null; // Stores card ID currently demanded by fans
        let tweets = [];

        function initGame() {
            updateUI(); displayCollection();
            setInterval(tick, 30000);
            setInterval(fastTick, 1000);
            setInterval(generateChat, 12000);
        }

        function tick() {
            // Income Multiplier based on Sentiment (0.5x to 2.0x)
            let sentMulti = 0.5 + (sentiment / 50); 
            userCash += Math.floor(25 * sentMulti);
            
            // Natural Sentiment Decay
            sentiment = Math.max(0, sentiment - 1);
            
            saveGame(); updateUI();
        }

        function fastTick() {
            // Placeholder for time-based events like invasions
        }

        function generateChat() {
            const users = ["@TedMoney", "@TrashyPromoter", "@ScrapKing", "@SmarkFan_99", "@EWF_Insider"];
            const colors = ["#f1c40f", "#95a5a6", "#e74c3c", "#3498db", "var(--gold)"];
            const idx = Math.floor(Math.random() * users.length);
            
            let text = "";
            let interactive = false;

            // Randomly trigger a Fan Demand
            if (Math.random() < 0.2) {
                fanDemand = Math.floor(Math.random() * totalCards) + 1;
                text = `I really want to see Card #${fanDemand} get a win tonight! Who's with me? #EWFUniverse`;
            } else {
                const phrases = [
                    "Just outbid someone for a Mint 10. Feels good. 💸",
                    "This promotion is losing its heat. Need a big match soon.",
                    "Is Card #7 the rarest? I've heard rumors.",
                    "Why isn't @YOU booking more Holo matches?",
                    "The Stock Market is wild today. 📈"
                ];
                text = phrases[Math.floor(Math.random() * phrases.length)];
                if(Math.random() > 0.5) interactive = true; // Make some tweets interactive
            }

            postTweet(text, users[idx], colors[idx], interactive);
        }

        function postTweet(text, user, color, interactive) {
            let replyBtn = interactive ? `<button class="reply-btn" onclick="prReply(this)">[REPLY]</button>` : "";
            tweets.unshift(`<div class="tweet">${replyBtn}<b style="color:${color};">${user}:</b> <span style="color:#ccc;">${text}</span></div>`);
            if(tweets.length > 5) tweets.pop();
            document.getElementById('social-content').innerHTML = tweets.join('');
        }

        function prReply(btn) {
            if(userCash < 50) return alert("PR Campaign requires $50!");
            userCash -= 50;
            sentiment = Math.min(100, sentiment + 10);
            btn.parentElement.style.opacity = "0.5";
            btn.remove();
            updateUI();
        }

        function ripPack(cost, holoChance) {
            if (userCash < cost) return alert("Not enough cash!");
            userCash -= cost;
            const area = document.getElementById('pack-area');
            area.innerHTML = `<div id="sealed-pack" onclick="openPack(${holoChance})"><h2>RIP!</h2></div>`;
            updateUI();
        }

        function openPack(holoChance) {
            const area = document.getElementById('pack-area');
            area.innerHTML = "";
            for (let i = 0; i < 5; i++) {
                let num = Math.floor(Math.random() * totalCards) + 1;
                let isHolo = Math.random() < holoChance;
                let grade = Math.floor(Math.random() * 4) + 7;
                collection.push({ img: `card (${num}).jpg`, id: num, wins: 0, holo: isHolo, grade: grade });
            }
            saveGame(); displayCollection();
        }

        function displayCollection() {
            const grid = document.getElementById('collection-grid');
            grid.innerHTML = '';
            collection.forEach((card, index) => {
                const container = document.createElement('div');
                container.className = 'card-container';
                container.innerHTML = `
                    <div class="saved-card ${card.holo ? 'is-holo' : ''}">
                        <div class="grade-label ${card.grade === 10 ? 'gem-mint' : ''}">MINT ${card.grade}</div>
                        <div style="position:absolute; inset:30px 0 0 0; background-image:url('${folderPath}/${card.img}'); background-size:cover;"></div>
                    </div>
                    <div class="gm-controls">
                        <button class="gm-btn" onclick="runBattle(${index})">BOOK FIGHT</button>
                        <button class="gm-btn" onclick="sellCard(${index})">SELL ($${card.grade * 20})</button>
                    </div>
                `;
                grid.appendChild(container);
            });
        }

        function runBattle(idx) {
            const overlay = document.getElementById('battle-overlay');
            const card = collection[idx];
            overlay.style.display = 'flex';
            document.getElementById('battle-card').style.backgroundImage = `url('${folderPath}/${card.img}')`;
            
            setTimeout(() => {
                let win = Math.random() < 0.6;
                if(win) {
                    document.getElementById('battle-text').innerText = "WINNER!";
                    sentiment = Math.min(100, sentiment + 2);
                    
                    // Check for Fan Demand fulfillment
                    if(fanDemand === card.id) {
                        sentiment = Math.min(100, sentiment + 15);
                        userCash += 500;
                        fanDemand = null;
                        postTweet("The GM delivered! Massive win for the fans!", "@EWF_Insider", "var(--gold)", false);
                    }
                } else {
                    document.getElementById('battle-text').innerText = "DEFEAT";
                    sentiment = Math.max(0, sentiment - 4);
                }
                saveGame(); updateUI();
            }, 1500);
        }

        function sellCard(idx) {
            userCash += collection[idx].grade * 20;
            collection.splice(idx, 1);
            saveGame(); updateUI(); displayCollection();
        }

        function updateUI() {
            document.getElementById('cash-display').innerHTML = `CONTRACT FUNDS: $${userCash}`;
            let sentMulti = 0.5 + (sentiment / 50);
            document.getElementById('sentiment-text').innerText = `${sentiment}% (${sentMulti.toFixed(1)}x)`;
            document.getElementById('sentiment-fill').style.width = sentiment + "%";
            document.getElementById('income-display').innerHTML = `PASSIVE INCOME: $${Math.floor(25 * sentMulti)} / tick`;
            
            let rank = "ROOKIE PROMOTER";
            if(collection.length > 20) rank = "ELITE EXECUTIVE";
            else if(collection.length > 10) rank = "PRO MANAGER";
            document.getElementById('rank-display').innerText = `RANK: ${rank}`;
        }

        function saveGame() {
            localStorage.setItem('EWF_Cash', userCash);
            localStorage.setItem('EWF_Collection', JSON.stringify(collection));
            localStorage.setItem('EWF_Sentiment', sentiment);
        }

        function hardReset() { if(confirm("Start fresh?")) { localStorage.clear(); location.reload(); } }
    </script>
</body>
</html>
